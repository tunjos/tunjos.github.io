<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}" data-theme="light">
<head>
  {% include head.html %}
</head>
<body class="page page--{{ page.layout }}">

  <!-- Inline SVG sprite: first element in <body> so <use href="#icon-…"> references
       resolve correctly on all browsers (Req 1.3, 1.7, 7.1) -->
  {% if site.icon_sprite %}{% include icon-sprite.html %}{% endif %}

  <!-- Skip navigation link: first focusable element on every page (Req 7.3) -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- Theme toggle: persists chosen theme in localStorage (Req 4.1–4.8) -->
  <button class="theme-toggle"
          type="button"
          aria-label="Toggle dark mode"
          aria-pressed="false">
    <!-- Sun icon (shown in dark mode to switch to light) -->
    <svg class="theme-toggle__icon theme-toggle__icon--sun"
         aria-hidden="true" focusable="false"
         width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1"  x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22"  x2="5.64"  y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1"  y1="12" x2="3"  y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"></line>
      <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"></line>
    </svg>
    <!-- Moon icon (shown in light mode to switch to dark) -->
    <svg class="theme-toggle__icon theme-toggle__icon--moon"
         aria-hidden="true" focusable="false"
         width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>

  <!-- Site layout grid: header (sidebar) + main content + footer (Req 2.1, 3.1) -->
  <div class="site-layout">

    <!-- Site header / sidebar: contains nav (Req 2.5, 8.8) -->
    <header class="site-header" role="banner">
      {% include nav.html %}
    </header>

    <!-- Main content area (Req 7.7) -->
    <main id="main-content" class="site-main" role="main" tabindex="-1">
      {{ content }}
    </main>

    <!-- Site footer: dynamic copyright year, no third-party ad scripts (Req 10.5, 10.6) -->
    <footer class="site-footer" role="contentinfo">
      <p class="site-footer__copyright">
        &copy; {{ site.author_name }}, {{ site.time | date: '%Y' }}.
        Powered by <a href="https://jekyllrb.com" rel="noopener noreferrer">Jekyll</a>.
      </p>
    </footer>

  </div><!-- /.site-layout -->

  <!-- Back-to-top button: shown via JS when scrollY > 200px (Req 8.6) -->
  {% include back-to-top.html %}

  <!-- Deferred JavaScript bundle (Req 6.4) -->
  {% include scripts.html %}

</body>
</html>
