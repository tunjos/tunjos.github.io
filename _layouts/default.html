<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}" data-theme="light">
<head>
  {% include head.html %}
</head>
<body class="page page--{{ page.layout }}">

  <!-- Inline SVG sprite: first element in <body> so <use href="#icon-…"> references
       resolve correctly on all browsers (Req 1.3, 1.7, 7.1) -->
  {% if site.icon_sprite %}{% include icon-sprite.html %}{% endif %}

  <!-- Skip navigation link: first focusable element on every page (Req 7.3) -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- Site layout grid: header (sidebar) + main content + footer (Req 2.1, 3.1) -->
  <div class="site-layout">

    <!-- Site header / sidebar: contains nav (Req 2.5, 8.8) -->
    <header class="site-header" role="banner">
      {% include nav.html %}
    </header>

    <!-- Main content area (Req 7.7) -->
    <main id="main-content" class="site-main" role="main" tabindex="-1">
      {{ content }}
    </main>

    <!-- Site footer: dynamic copyright year, no third-party ad scripts (Req 10.5, 10.6) -->
    <footer class="site-footer" role="contentinfo">
      <p class="site-footer__copyright">
        &copy; {{ site.author_name }}, {{ site.time | date: '%Y' }}.
        Powered by <a href="https://jekyllrb.com" rel="noopener noreferrer">Jekyll</a>.
      </p>
    </footer>

  </div><!-- /.site-layout -->

  <!-- Back-to-top button: shown via JS when scrollY > 200px (Req 8.6) -->
  {% include back-to-top.html %}

  <!-- Deferred JavaScript bundle (Req 6.4) -->
  {% include scripts.html %}

</body>
</html>
