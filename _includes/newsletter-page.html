<aside class="newsletter" aria-label="Newsletter signup">
  <h2 class="newsletter__title">Enjoy reading this?</h2>
  <p class="newsletter__body">Join my Smartletter — new posts delivered to your inbox.</p>
  <form class="newsletter__form"
        action="https://tinyletter.com/tunjos"
        method="post"
        target="popupwindow"
        onsubmit="window.open('https://tinyletter.com/tunjos', 'popupwindow', 'scrollbars=yes,width=800,height=600');return true">
    <label class="newsletter__label" for="tlemail">Email address</label>
    <div class="newsletter__controls">
      <input class="newsletter__input"
             type="email"
             name="email"
             id="tlemail"
             placeholder="your@email.com"
             required
             autocomplete="email" />
      <input type="hidden" value="1" name="embed" />
      <button class="newsletter__submit" type="submit">Subscribe</button>
    </div>
    <p class="newsletter__powered-by">
      <a href="https://tinyletter.com" target="_blank" rel="noopener noreferrer">Powered by TinyLetter</a>
    </p>
  </form>
</aside>
