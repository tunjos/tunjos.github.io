<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<!-- Flash-of-Wrong-Theme prevention (FOTWT): runs before any stylesheet to avoid
     a flash of the wrong color scheme. Reads localStorage, falls back to
     prefers-color-scheme, then sets data-theme on <html>. -->
<script>
(function(){
  var t;
  try { t = localStorage.getItem('theme'); } catch(e) {}
  if (!t) {
    t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    try { localStorage.setItem('theme', t); } catch(e) {}
  }
  document.documentElement.setAttribute('data-theme', t);
}());
</script>

<!-- SEO meta tags: title, description, canonical, Open Graph, Twitter Card
     generated by jekyll-seo-tag (Req 9.6, 9.7) -->
{% seo %}

<!-- Resource hints: preload self-hosted assets to reduce render-blocking latency -->
<!-- Inter variable font — progressive enhancement over system font stack (Req 5.1) -->
<link rel="preload" href="/assets/fonts/inter-var.woff2" as="font" type="font/woff2" crossorigin>
<!-- Author avatar — above the fold in the sidebar (Req 6.3, 19.1) -->
<link rel="preload" href="{{ site.logo }}" as="image">

<!-- Preconnect / dns-prefetch for third-party origins used at runtime (Req 6.10) -->
{% if site.disqus_shortname %}
<link rel="preconnect" href="https://disqus.com" crossorigin>
<link rel="dns-prefetch" href="https://disqus.com">
<link rel="dns-prefetch" href="https://c.disquscdn.com">
{% endif %}
{% if site.google_analytics %}
<link rel="preconnect" href="https://www.google-analytics.com" crossorigin>
<link rel="dns-prefetch" href="https://www.google-analytics.com">
{% endif %}

<!-- Favicons -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<!-- Critical CSS inlined for above-the-fold rendering (≤ 14 KB, Req 6.3).
     Full stylesheet loads asynchronously via media="print" swap (Req 6.4). -->
<style>{% include critical-css.html %}</style>
<link rel="stylesheet" href="/assets/css/main.css" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="/assets/css/main.css"></noscript>

<!-- RSS/Atom feed auto-discovery (Req 9.8) -->
<link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS Feed" href="/feed.xml">

<!-- Article-specific Open Graph properties (jekyll-seo-tag handles og:title,
     og:description, og:image, og:url; these supplement with article metadata) -->
{% if page.date %}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
<meta property="article:author" content="{{ site.url }}/about/">
{% endif %}
{% if page.categories %}
{% for category in page.categories limit:1 %}
<meta property="article:section" content="{{ category }}">
{% endfor %}
{% endif %}
{% if page.tags %}
{% for tag in page.tags %}
<meta property="article:tag" content="{{ tag }}">
{% endfor %}
{% endif %}
